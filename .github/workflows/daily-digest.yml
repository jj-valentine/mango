name: Daily Email Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC every day
  workflow_dispatch:        # manual trigger for testing

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit seen.db + screenshots back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: uv run python -m email_digest.main

      - name: Commit cache and screenshots
        run: |
          git config user.name "digest-bot"
          git config user.email "bot@noreply.github.com"
          git add data/seen.db data/screenshots/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update digest cache [skip ci]"
            git push
          fi
