name: Daily Email Digest

on:
  schedule:
    - cron: '30 15 * * *'  # 7:30 AM PST (15:30 UTC)
  workflow_dispatch:        # manual trigger for testing

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit seen_*.db + screenshots back

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Restore user configs from secrets
        env:
          JAMES_CONFIG: ${{ secrets.JAMES_CONFIG }}
          MOM_CONFIG: ${{ secrets.MOM_CONFIG }}
        run: |
          echo "$JAMES_CONFIG" | base64 -d > config/james.yaml
          echo "$MOM_CONFIG" | base64 -d > config/mom.yaml

      - name: Run digests (all users in config/)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: uv run python -m mango.main --config-dir config

      - name: Commit cache and screenshots
        run: |
          git config user.name "digest-bot"
          git config user.email "bot@noreply.github.com"
          git add data/seen_*.db data/screenshots/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update digest cache [skip ci]"
            git push
          fi

