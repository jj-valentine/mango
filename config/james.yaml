template_html: "digest.html.j2"
template_txt: "digest.txt.j2"

digest:
  email_to: "j@mesvalentine.com"
  email_from: "j@mesvalentine.com"
  subject: "Daily Intelligence Brief — {date}"
  send_time: "15:30 UTC"

# Checked AFTER analysis — used to refine "build vs integrate" recommendations.
# GITHUB_TOKEN (auto in Actions) works for public repos.
# Set GH_PAT secret for private repos.
projects:
  - repo: "jj-valentine/agenthq"
    files: ["README.md", "CLAUDE.md"]

entities:
  - name: "Nate B. Jones"
    description: "AI analyst and YouTuber"
    model: "claude-sonnet-4-6"
    include_comments: true
    max_comments: 40
    directive: |
      For each new video:
        1. Brief intro: main thesis (2-3 sentences)
        2. Novel AI concepts, frameworks, or workflows introduced
        3. All specific software tools mentioned or demoed
        4. Key insights from top comments (community signal)
        5. Visual summary: describe any important charts/diagrams visible in key frames
      Use chapter markers and heatmap peaks to prioritize which segments matter most.
      Include clickable timestamps for any referenced graphics.
    sources:
      - type: youtube
        url: "https://www.youtube.com/@NateBJones"
        max_videos: 5
        include_transcripts: true
        include_comments: true
        extract_frames: true
        max_frames: 5
        enrichment_source: "nate_transcripts"  # augments with pre-classified metadata

  - name: "Brian Casel"
    description: "SaaS entrepreneur and maker"
    model: "claude-sonnet-4-6"
    include_comments: true
    max_comments: 25
    directive: |
      For each new video:
        1. Core product/business insight (1-2 sentences)
        2. Tools or workflows Brian uses or recommends
        3. Notable community reactions from comments
    sources:
      - type: youtube
        url: "https://www.youtube.com/@briancasel"
        max_videos: 3
        include_transcripts: true
        include_comments: true
        extract_frames: true
        max_frames: 3

  - name: "Hacker News"
    description: "Tech community — top stories and discussions"
    model: "claude-haiku-4-5"
    include_comments: true
    max_comments: 5
    directive: |
      Surface top 10 AI/ML and developer-tools stories.
      For each: one-line summary + why it matters.
      Include top comment thread signal where discussion adds genuine insight.
      Flag anything relevant to agent systems, knowledge management, or dev tooling.
    sources:
      - type: api
        url: "https://hacker-news.firebaseio.com/v0/topstories.json"
        max_items: 10
        item_url: "https://hacker-news.firebaseio.com/v0/item/{id}.json"
