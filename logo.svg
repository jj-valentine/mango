<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 224">
  <defs>

    <!-- Flesh: warm gold radial, bright centre -->
    <radialGradient id="flesh" cx="40%" cy="36%" r="62%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFF9CC"/>
      <stop offset="38%"  stop-color="#FFE04A"/>
      <stop offset="100%" stop-color="#F4A81A"/>
    </radialGradient>

    <!-- Skin: sunset orange -->
    <radialGradient id="skin" cx="36%" cy="30%" r="66%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFCA40"/>
      <stop offset="52%"  stop-color="#F4931A"/>
      <stop offset="100%" stop-color="#C05800"/>
    </radialGradient>

    <!-- Leaf -->
    <linearGradient id="leafg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60C448"/>
      <stop offset="100%" stop-color="#2E8020"/>
    </linearGradient>

    <!--
      Grid pattern = the "hedgehog cut" of a mango —
      each scored cube reads as a digest content card.
      20 × 20 units with 1.5px gap + rounded corners.
    -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="1.5" y="1.5" width="17" height="17" rx="2.5"
            fill="#FFF8D0" fill-opacity="0.55"
            stroke="#B87010" stroke-width="0.9" stroke-opacity="0.28"/>
    </pattern>

    <!-- Clip to the flesh boundary -->
    <clipPath id="fc">
      <path d="M100 38
               C134 38,170 64,170 102
               C170 142,150 168,100 170
               C50 168,30 142,30 102
               C30 64,66 38,100 38Z"/>
    </clipPath>

    <!-- Soft ambient shadow on the mango body -->
    <filter id="shadow" x="-20%" y="-14%" width="145%" height="145%">
      <feDropShadow dx="0" dy="6" stdDeviation="9"
                    flood-color="#BF5800" flood-opacity="0.26"/>
    </filter>

    <!-- Specular highlight -->
    <radialGradient id="shine" cx="32%" cy="26%" r="44%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <!-- ─── MANGO BODY ──────────────────────────────────── -->

  <!-- Outer skin (larger shape, provides the coloured border) -->
  <path d="M100 22
           C140 22,182 54,182 102
           C182 152,158 180,100 182
           C42 180,18 152,18 102
           C18 54,60 22,100 22Z"
        fill="url(#skin)" filter="url(#shadow)"/>

  <!-- Inner flesh -->
  <path d="M100 38
           C134 38,170 64,170 102
           C170 142,150 168,100 170
           C50 168,30 142,30 102
           C30 64,66 38,100 38Z"
        fill="url(#flesh)"/>

  <!-- Scored grid — digest cards inside the mango -->
  <rect x="18" y="22" width="164" height="160"
        fill="url(#grid)" clip-path="url(#fc)"/>

  <!-- Specular sheen over flesh -->
  <path d="M100 38
           C134 38,170 64,170 102
           C170 142,150 168,100 170
           C50 168,30 142,30 102
           C30 64,66 38,100 38Z"
        fill="url(#shine)"/>

  <!-- ─── STEM ──────────────────────────────────────── -->
  <path d="M100 22 C100 16,100 10,101 5"
        stroke="#6B3A10" stroke-width="3.5"
        stroke-linecap="round" fill="none"/>

  <!-- ─── LEAF ──────────────────────────────────────── -->
  <path d="M100 14 C114 2,146 0,148 18
           C130 14,114 17,100 22Z"
        fill="url(#leafg)"/>
  <!-- Midrib vein -->
  <path d="M100 14 C120 8,136 10,148 18"
        stroke="#236620" stroke-width="0.8"
        fill="none" opacity="0.55"/>

  <!-- ─── WORDMARK ──────────────────────────────────── -->
  <text x="100" y="208"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="19" font-weight="600" letter-spacing="7"
        fill="#1C1C1C" text-anchor="middle">mango</text>

  <!-- Orange accent bar under wordmark -->
  <line x1="60" y1="215" x2="140" y2="215"
        stroke="#F4931A" stroke-width="2.5" stroke-linecap="round"/>

</svg>
