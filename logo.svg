<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <!-- Mango body gradient -->
    <radialGradient id="mangoGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFD95A"/>
      <stop offset="55%"  stop-color="#F4931A"/>
      <stop offset="100%" stop-color="#D95E0A"/>
    </radialGradient>
    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6DBF4A"/>
      <stop offset="100%" stop-color="#3D8A28"/>
    </linearGradient>
    <!-- Envelope gradient -->
    <linearGradient id="envGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFF8ED"/>
      <stop offset="100%" stop-color="#F5E0C0"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Mango body -->
  <ellipse
    cx="100" cy="95"
    rx="58" ry="72"
    fill="url(#mangoGrad)"
    filter="url(#shadow)"
  />

  <!-- Mango highlight -->
  <ellipse
    cx="82" cy="68"
    rx="18" ry="24"
    fill="white"
    opacity="0.18"
    transform="rotate(-20, 82, 68)"
  />

  <!-- Stem -->
  <rect x="97" y="20" width="6" height="16" rx="3" fill="#6B4226"/>

  <!-- Leaf -->
  <path
    d="M100 24 C115 10, 148 12, 145 30 C130 28, 112 32, 100 24Z"
    fill="url(#leafGrad)"
  />
  <!-- Leaf vein -->
  <path
    d="M100 24 C118 22, 140 26, 145 30"
    stroke="#2E6B18" stroke-width="0.8" fill="none" opacity="0.5"
  />

  <!-- Envelope body (bottom of mango, slightly overlapping) -->
  <rect x="62" y="148" width="76" height="48" rx="4" fill="url(#envGrad)" stroke="#D4A46A" stroke-width="1.2"/>

  <!-- Envelope flap (open, folded up) -->
  <path
    d="M62 148 L100 172 L138 148Z"
    fill="#EDD09A" stroke="#D4A46A" stroke-width="1.2" stroke-linejoin="round"
  />

  <!-- Envelope diagonal lines (V crease lines from corners to centre-bottom) -->
  <line x1="62" y1="196" x2="100" y2="172" stroke="#D4A46A" stroke-width="0.9" opacity="0.7"/>
  <line x1="138" y1="196" x2="100" y2="172" stroke="#D4A46A" stroke-width="0.9" opacity="0.7"/>

  <!-- Wordmark -->
  <text
    x="100" y="212"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
    font-size="22"
    font-weight="600"
    letter-spacing="3"
    fill="#2D2D2D"
    text-anchor="middle"
  >mango</text>
</svg>
