<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400">
  <defs>

    <!-- Watercolor displacement: soft organic edge bleed -->
    <filter id="wc" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024 0.020"
                    numOctaves="4" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise"
                         scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="wcl" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016 0.013"
                    numOctaves="3" seed="19" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise"
                         scale="13" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Mango flesh: warm gold centre bleeding to deep orange -->
    <radialGradient id="mbase" cx="42%" cy="36%" r="62%">
      <stop offset="0%"   stop-color="#FFE95C"/>
      <stop offset="50%"  stop-color="#F4921A"/>
      <stop offset="100%" stop-color="#C86010"/>
    </radialGradient>

    <!-- Curved text paths (radius 158, centre 200,200) -->
    <path id="tArc" d="M 42,200 A 158,158 0 0,1 358,200"/>
    <path id="bArc" d="M 42,200 A 158,158 0 0,0 358,200"/>

  </defs>

  <!-- ── BADGE RINGS ──────────────────────────────────────── -->
  <circle cx="200" cy="200" r="192" fill="#241A12"/>
  <circle cx="200" cy="200" r="177" fill="#FFFEF6"/>
  <!-- inner decorative ring -->
  <circle cx="200" cy="200" r="170" fill="none"
          stroke="#241A12" stroke-width="0.9" opacity="0.2"/>

  <!-- ── WATERCOLOR MANGO ─────────────────────────────────── -->

  <!-- Layer 1 — base orange body (main mango silhouette) -->
  <path d="M200,86 C234,84 256,114 254,155 C252,198 234,222 200,220
           C166,218 146,194 148,152 C150,110 168,88 200,86Z"
        fill="url(#mbase)" fill-opacity="0.87" filter="url(#wc)"/>

  <!-- Layer 2 — warm shadow (right/lower side) -->
  <ellipse cx="222" cy="170" rx="38" ry="52"
           fill="#B04C00" fill-opacity="0.26" filter="url(#wcl)"/>

  <!-- Layer 3 — bright yellow centre wash -->
  <ellipse cx="190" cy="143" rx="36" ry="46"
           fill="#FFE860" fill-opacity="0.52" filter="url(#wc)"/>

  <!-- Layer 4 — warm blush, left edge -->
  <ellipse cx="170" cy="158" rx="20" ry="32"
           fill="#E87428" fill-opacity="0.18" filter="url(#wcl)"/>

  <!-- Layer 5 — specular white spot -->
  <ellipse cx="180" cy="130" rx="13" ry="16"
           fill="#FFFFFF" fill-opacity="0.52" filter="url(#wc)"/>

  <!-- Stem -->
  <path d="M 201,88 C 200,80 201,73 202,66"
        stroke="#7B421A" stroke-width="3.5" stroke-linecap="round" fill="none"/>

  <!-- Leaf — two overlapping washes -->
  <path d="M 200,77 C 216,62 248,60 249,82 C 229,77 213,80 200,88Z"
        fill="#54B83A" fill-opacity="0.86" filter="url(#wcl)"/>
  <path d="M 200,75 C 218,63 242,65 246,80 C 228,75 213,78 200,86Z"
        fill="#8ED85C" fill-opacity="0.48" filter="url(#wc)"/>
  <!-- leaf midrib -->
  <path d="M 200,77 C 220,71 236,73 249,82"
        stroke="#246820" stroke-width="0.9" fill="none" opacity="0.55"/>

  <!-- ── WORDMARK ZONE ─────────────────────────────────────── -->
  <!-- top rule -->
  <line x1="72" y1="232" x2="328" y2="232"
        stroke="#241A12" stroke-width="1.5" opacity="0.65"/>

  <text x="200" y="263"
        font-family="Georgia, 'Palatino Linotype', Palatino, serif"
        font-size="36" font-weight="700" letter-spacing="10"
        fill="#241A12" text-anchor="middle">mango</text>

  <!-- bottom rule -->
  <line x1="72" y1="276" x2="328" y2="276"
        stroke="#241A12" stroke-width="1.5" opacity="0.65"/>

  <!-- ── CIRCULAR TEXT ─────────────────────────────────────── -->
  <text font-family="Georgia, Palatino, serif"
        font-size="11.5" letter-spacing="3.5" fill="#241A12">
    <textPath xlink:href="#tArc" startOffset="50%" text-anchor="middle">
      DAILY DIGEST  ·  AI CURATED
    </textPath>
  </text>

  <text font-family="Georgia, Palatino, serif"
        font-size="11.5" letter-spacing="3.5" fill="#241A12">
    <textPath xlink:href="#bArc" startOffset="50%" text-anchor="middle">
      SELF-HOSTED  ·  OPEN SOURCE
    </textPath>
  </text>

</svg>
